name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      APP_NAME: BrewUI
      APP_VERSION: ${{ github.ref_name }}
      APPCAST_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      BUNDLE_ID: io.github.buiducnhat.brewui
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
      SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      APPLE_NOTARY_API_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize version
        run: echo "APP_VERSION=${APP_VERSION#v}" >> "$GITHUB_ENV"

      - name: Import signing certificate
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE_P12_BASE64:-}" || -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "APPLE_CERTIFICATE_P12_BASE64 and APPLE_CERTIFICATE_PASSWORD are required" >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/brewui-release.keychain-db"
          CERT_PATH="$RUNNER_TEMP/brewui-release.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode >"$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build, sign, and package release
        run: ./script/release.sh

      - name: Create GitHub release notes
        id: notes
        run: |
          set -euo pipefail
          mkdir -p build/release/notes
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq '.body' > "build/release/notes/${APP_NAME}-${APP_VERSION}.md"
          echo "path=build/release/notes/${APP_NAME}-${APP_VERSION}.md" >> "$GITHUB_OUTPUT"

      - name: Publish Sparkle update site
        run: |
          set -euo pipefail
          RELEASE_ZIP="build/release/${APP_VERSION}/artifacts/${APP_NAME}-${APP_VERSION}.zip"
          RELEASE_NOTES_FILE="${{ steps.notes.outputs.path }}"
          export RELEASE_ZIP RELEASE_NOTES_FILE RELEASE_TAG="${GITHUB_REF_NAME}"
          ./script/publish_update_site.sh

      - name: Create GitHub release
        run: |
          set -euo pipefail
          RELEASE_ZIP="build/release/${APP_VERSION}/artifacts/${APP_NAME}-${APP_VERSION}.zip"
          gh release create "${GITHUB_REF_NAME}" "$RELEASE_ZIP" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${{ steps.notes.outputs.path }}"
